<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Grid View</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        width: 100%;
        background: #ffffff;
        color: #000000;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        overflow: auto;
      }

      #grid-wrapper {
        position: fixed;
        inset: 0;
        background: #ffffff;
        overflow: hidden;
      }

      #grid-canvas {
        position: absolute;
        top: 0;
        left: 0;
        outline: none;
      }

      #grid-spacer {
        display: block;
        width: 100%;
        height: 100%;
      }

      #edit-input {
        position: absolute;
        display: none;
        border: none;
        background: transparent;
        color: #000000;
        padding: 0 8px;
        margin: 0;
        outline: none;
        box-shadow: none;
        z-index: 10;
        border-radius: 0;
        font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="grid-spacer"></div>
    <div id="grid-wrapper">
      <canvas id="grid-canvas" tabindex="0"></canvas>
      <input id="edit-input" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <script type="module" src="dist/main.js"></script>
  </body>
</html>
