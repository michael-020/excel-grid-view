<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Grid View</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        width: 100%;
        background: #ffffff;
        color: #000000;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        overflow: auto;
      }

      #grid-wrapper {
        position: fixed;
        inset: 0;
        background: #ffffff;
        overflow: hidden;
      }

      #grid-canvas {
        position: absolute;
        top: 0;
        left: 0;
        outline: none;
      }

      #grid-spacer {
        display: block;
        width: 100%;
        height: 100%;
      }

      #edit-input {
        position: absolute;
        display: none;
        border: none;
        background: transparent;
        color: #000000;
        padding: 0 8px;
        margin: 0;
        outline: none;
        box-shadow: none;
        z-index: 10;
        border-radius: 0;
        font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        box-sizing: border-box;
      }

      #summary-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 28px;
        background: #f3f4f6;
        color: #111827;
        border-top: 1px solid rgba(0,0,0,0.06);
        font: 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        padding: 0 12px;
        box-sizing: border-box;
        z-index: 20;
      }

      #summary-left {
        position: fixed;
        left: 0;
        top: 40px;
        width: 220px;
        background: rgba(243,244,246,0.95);
        border-right: 1px solid rgba(0,0,0,0.06);
        color: #111827;
        padding: 8px 12px;
        font: 13px ui-sans-serif, system-ui;
        box-sizing: border-box;
        z-index: 20;
      }

      #formula-menu {
        position: absolute;
        display: none;
        background: #ffffff;
        border: 1px solid rgba(0,0,0,0.08);
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        z-index: 30;
        min-width: 140px;
        font: 13px ui-sans-serif, system-ui;
        border-radius: 4px;
        padding: 6px 0;
      }

      #formula-menu .item {
        padding: 6px 12px;
        cursor: pointer;
      }

      #formula-menu .item:hover {
        background: #f3f4f6;
      }
    </style>
  </head>
  <body>
    <div id="grid-spacer"></div>
    <div id="grid-wrapper">
      <canvas id="grid-canvas" tabindex="0"></canvas>
      <input id="edit-input" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div id="summary-bar" aria-live="polite"></div>
    <div id="formula-menu" role="listbox" aria-hidden="true"></div>
    <script type="module" src="dist/main.js"></script>
  </body>
</html>
